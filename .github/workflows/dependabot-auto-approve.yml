name: Dependabot Auto-merge
on:
  pull_request:
    branches:
      - 'main'

permissions:
  pull-requests: write
  contents: write

jobs:
  dependabot-auto-merge:
    permissions:
      id-token: write
      pull-requests: write
      contents: write
      actions: read
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    uses: HillwoodPark/shared-github-workflows/.github/workflows/dependabot-auto-approve.yml@a1027dc5879df3ef302ee6c2a69364b269b4f2d8
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    with:
      node-version: '24.x'
      npm-registry-url: 'https://npm.pkg.github.com'
